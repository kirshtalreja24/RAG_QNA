<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG QA System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg2:       #161b25;
      --bg3:       #1c2333;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.14);
      --text:      #e8eaf0;
      --text2:     #8b92a5;
      --text3:     #525a6e;
      --green:     #1D9E75;
      --green-dim: rgba(29,158,117,0.12);
      --amber:     #EF9F27;
      --amber-dim: rgba(239,159,39,0.12);
      --blue:      #378ADD;
      --blue-dim:  rgba(55,138,221,0.10);
      --red:       #E24B4A;
      --radius:    10px;
      --radius-sm: 6px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ───────────────────────────────────────────── */
    .app {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      position: relative;
    }

    /* subtle grid background */
    .app::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    .content { position: relative; z-index: 1; }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      flex-shrink: 0;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .status-dot.offline { background: var(--red); box-shadow: 0 0 10px var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .header-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.06em;
    }

    .header-badges {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 3px 9px;
      letter-spacing: 0.04em;
    }

    /* ── Search Card ──────────────────────────────────────── */
    .search-card {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .field-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .q-input {
      flex: 1;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      min-height: 46px;
    }
    .q-input::placeholder { color: var(--text3); }
    .q-input:focus { border-color: var(--border2); }

    .run-btn {
      width: 46px; height: 46px;
      background: var(--green-dim);
      border: 0.5px solid var(--green);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--green);
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .run-btn:hover { background: rgba(29,158,117,0.22); }
    .run-btn:active { transform: scale(0.94); }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .run-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .run-btn.loading svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* params */
    .params-row {
      display: flex;
      gap: 8px;
      margin-top: 0.85rem;
      flex-wrap: wrap;
    }

    .param-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
    }

    .param-key {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
    }

    .param-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      width: 38px;
      text-align: center;
    }
    .param-input.wide { width: 80px; }

    /* ── Suggestions ──────────────────────────────────────── */
    .suggestions-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .sugg-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      flex-shrink: 0;
    }

    .chip {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      white-space: nowrap;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chip:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }

    .shuffle-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.12s, border-color 0.12s;
    }
    .shuffle-btn:hover { color: var(--text2); border-color: var(--border2); }
    .shuffle-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Results ──────────────────────────────────────────── */
    .result-card {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.22s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

    .result-header {
      padding: 0.8rem 1rem;
      background: var(--bg3);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .result-q-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .result-q-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      line-height: 1.5;
    }

    .result-latency {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .result-body { padding: 1.1rem 1.1rem 1.25rem; }

    .answer-block {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 1.25rem;
      padding-bottom: 1.1rem;
      border-bottom: 0.5px solid var(--border);
    }

    .sources-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0.6rem;
    }

    .sources-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
    }

    .sources-count {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      color: var(--text3);
    }

    .source-item {
      display: flex;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.1s;
      cursor: default;
      margin-bottom: 2px;
    }
    .source-item:hover { background: var(--bg3); }

    .source-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      min-width: 20px;
      padding-top: 1px;
    }

    .source-info { flex: 1; min-width: 0; }

    .source-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }

    .source-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .source-score {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--amber);
      flex-shrink: 0;
    }

    .source-snippet {
      font-size: 11px;
      color: var(--text2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Error Banner ─────────────────────────────────────── */
    .error-banner {
      background: rgba(226,75,74,0.1);
      border: 0.5px solid rgba(226,75,74,0.35);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
      margin-bottom: 1rem;
      display: none;
    }
    .error-banner.visible { display: block; animation: fadeUp 0.2s ease; }

    /* ── Empty / Loading ──────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 0.75rem;
      display: block;
      opacity: 0.5;
    }

    .empty-text {
      font-family: var(--mono);
      font-size: 12px;
    }

    .skeleton-card {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.22s ease;
    }

    .skeleton-header {
      padding: 0.8rem 1rem;
      background: var(--bg3);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .skeleton-header-q {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text2);
      flex: 1;
    }

    .skeleton-header-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
    }

    .skeleton-body { padding: 1.1rem; display: flex; flex-direction: column; gap: 10px; }

    .skel {
      height: 11px;
      border-radius: 6px;
      background: var(--bg3);
      animation: shimmer 1.1s ease-in-out infinite alternate;
    }
    @keyframes shimmer { from{opacity:0.35} to{opacity:0.8} }

    /* ── History tabs ─────────────────────────────────────── */
    .history-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .history-tab {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 3px 9px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-tab:hover { color: var(--text2); border-color: var(--border2); background: var(--bg2); }
    .history-tab.active { color: var(--text); border-color: var(--border2); background: var(--bg2); }

    /* ── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
  </style>
</head>
<body>
<div class="app">
  <div class="content">

    <!-- Header -->
    <div class="header">
      <div class="status-dot" id="statusDot"></div>
      <span class="header-title">RAG / QA — Natural Questions</span>
      <div class="header-badges">
        <span class="badge">BM25 + FAISS</span>
        <span class="badge">BART</span>
      </div>
    </div>

    <!-- Error Banner -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- Search Card -->
    <div class="search-card">
      <div class="field-label">Query</div>
      <div class="input-row">
        <input
          class="q-input"
          id="qInput"
          type="text"
          placeholder="Ask anything from the knowledge base…"
          autocomplete="off"
        />
        <button class="run-btn" id="runBtn" title="Run query" onclick="handleRun()">
          <!-- arrow icon -->
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

      <!-- Parameters -->
      <div class="params-row">
        <div class="param-box">
          <span class="param-key">--k</span>
          <input class="param-input" id="kInput" type="number" value="5" min="1" max="20" title="Number of final results" />
        </div>
        <div class="param-box">
          <span class="param-key">--candidate-k</span>
          <input class="param-input" id="ckInput" type="number" value="50" min="10" max="500" title="Candidate pool size" />
        </div>
        <div class="param-box">
          <span class="param-key">--model</span>
          <input class="param-input wide" id="modelInput" type="text" value="" placeholder="default" title="Override model name" />
        </div>
      </div>
    </div>

    <!-- Suggestions -->
    <div class="suggestions-wrap" id="suggestionsWrap">
      <span class="sugg-label">try →</span>
      <!-- chips injected by JS -->
      <button class="shuffle-btn" id="shuffleBtn" title="Shuffle suggestions">
        <!-- refresh icon -->
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.62"/></svg>
        shuffle
      </button>
    </div>

    <!-- History bar (appears after first query) -->
    <div class="history-bar" id="historyBar" style="display:none"></div>

    <!-- Results -->
    <div id="resultsArea">
      <div class="empty-state">
        <span class="empty-icon">⌖</span>
        <div class="empty-text">enter a question to begin retrieval</div>
      </div>
    </div>

  </div><!-- .content -->
</div><!-- .app -->

<script>
  // Resolve API base depending on how the frontend is served:
  // - If served from the Flask app (same origin), keep '' so requests go to same origin.
  // - If served from Live Server (commonly port 5500) or another host, point to localhost:5000.
  const API_BASE = (function() {
    try {
      const port = location && location.port ? String(location.port) : '';
      // Live Server/VSCode default port is often 5500 — detect and route to backend.
      if (port === '5500') return 'http://localhost:5000';
      // If served via file:// or unknown environment, default to backend as well.
      if (location.protocol === 'file:') return 'http://localhost:5000';
      return ''; // same-origin
    } catch (e) {
      return 'http://localhost:5000';
    }
  })();

  const ALL_SUGGESTIONS = [
    "Who invented the telephone?",
    "What is the capital of Australia?",
    "When did World War II end?",
    "What is photosynthesis?",
    "How does the human immune system work?",
    "Who wrote the theory of relativity?",
    "What causes earthquakes?",
    "What is the speed of light?",
    "Who was the first person on the moon?",
    "What is the population of China?",
    "How do vaccines work?",
    "What is machine learning?",
    "Who discovered penicillin?",
    "What is the tallest mountain on Earth?",
    "How long does it take light to reach Earth from the Sun?",
    "What language has the most native speakers?",
    "Who painted the Sistine Chapel?",
    "What is the deepest ocean trench?",
    "How does DNA replication work?",
    "When was the internet invented?",
  ];

  // ── State ────────────────────────────────────────────────
  let isLoading = false;
  let history = [];   // [{question, answer, sources, latency_s}]

  // ── Helpers ──────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 6000);
  }

  function setLoading(v) {
    isLoading = v;
    const btn = document.getElementById('runBtn');
    btn.disabled = v;
    btn.classList.toggle('loading', v);
    if (v) {
      btn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>`;
    } else {
      btn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
    }
  }

  // ── Health check ─────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(API_BASE + '/api/health');
      const d = await r.json();
      const dot = document.getElementById('statusDot');
      if (d.status === 'ok') {
        dot.classList.remove('offline');
        dot.title = 'Pipeline ready';
      } else {
        dot.classList.add('offline');
        dot.title = 'Pipeline not ready';
      }
    } catch {
      document.getElementById('statusDot').classList.add('offline');
    }
  }

  // ── Suggestions ──────────────────────────────────────────
  function renderSuggestions(suggestions) {
    const wrap = document.getElementById('suggestionsWrap');
    // remove old chips
    wrap.querySelectorAll('.chip').forEach(c => c.remove());
    const shuffle = document.getElementById('shuffleBtn');
    suggestions.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = q;
      btn.title = q;
      btn.onclick = () => {
        document.getElementById('qInput').value = q;
        document.getElementById('qInput').focus();
      };
      wrap.insertBefore(btn, shuffle);
    });
  }

  async function fetchSuggestions() {
    try {
      const r = await fetch(API_BASE + '/api/suggestions');
      const d = await r.json();
      renderSuggestions(d.suggestions);
    } catch {
      // fallback: random from local list
      const shuffled = [...ALL_SUGGESTIONS].sort(() => Math.random() - 0.5);
      renderSuggestions(shuffled.slice(0, 4));
    }
  }

  document.getElementById('shuffleBtn').onclick = fetchSuggestions;

  // ── History ───────────────────────────────────────────────
  function pushHistory(result) {
    history.unshift(result);
    if (history.length > 8) history.pop();
    renderHistoryBar();
  }

  function renderHistoryBar() {
    const bar = document.getElementById('historyBar');
    if (history.length === 0) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    bar.innerHTML = history.map((r, i) =>
      `<button class="history-tab ${i === 0 ? 'active' : ''}"
         onclick="showHistoryItem(${i})"
         title="${esc(r.question)}">${esc(r.question)}</button>`
    ).join('');
  }

  function showHistoryItem(idx) {
    renderResult(history[idx]);
    document.querySelectorAll('.history-tab').forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });
  }

  // ── Skeleton ─────────────────────────────────────────────
  function showSkeleton(q) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="skeleton-card">
        <div class="skeleton-header">
          <span class="skeleton-header-q">${esc(q)}</span>
          <span class="skeleton-header-tag">retrieving…</span>
        </div>
        <div class="skeleton-body">
          <div class="skel" style="width:88%"></div>
          <div class="skel" style="width:72%"></div>
          <div class="skel" style="width:95%"></div>
          <div class="skel" style="width:60%;margin-top:4px"></div>
          <div class="skel" style="width:80%"></div>
        </div>
      </div>`;
  }

  // ── Render Result ─────────────────────────────────────────
  function renderResult(data) {
    const sources = (data.sources || []);
    const sourcesHtml = sources.map((s, i) => {
      const title   = esc(s.title   || `Source ${i+1}`);
      const score   = s.rerank_score != null ? Number(s.rerank_score).toFixed(3) : '—';
      const snippet = esc((s.snippet || '').slice(0, 200));
      return `
        <div class="source-item">
          <span class="source-num">[${i+1}]</span>
          <div class="source-info">
            <div class="source-top">
              <span class="source-title">${title}</span>
              <span class="source-score">score: ${score}</span>
            </div>
            ${snippet ? `<div class="source-snippet">${snippet}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    document.getElementById('resultsArea').innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <span class="result-q-label">Q</span>
          <span class="result-q-text">${esc(data.question)}</span>
          <span class="result-latency">${data.latency_s}s</span>
        </div>
        <div class="result-body">
          <div class="answer-block">${esc(data.answer)}</div>
          ${sources.length ? `
            <div class="sources-header">
              <span class="sources-title">Sources</span>
              <span class="sources-count">${sources.length}</span>
            </div>
            ${sourcesHtml}
          ` : '<span style="font-family:var(--mono);font-size:11px;color:var(--text3)">no sources returned</span>'}
        </div>
      </div>`;
  }

  // ── Main Query ────────────────────────────────────────────
  async function handleRun() {
    if (isLoading) return;

    const q  = document.getElementById('qInput').value.trim();
    if (!q) { document.getElementById('qInput').focus(); return; }

    const k    = parseInt(document.getElementById('kInput').value)  || 5;
    const ck   = parseInt(document.getElementById('ckInput').value) || 50;
    const model = document.getElementById('modelInput').value.trim() || null;

    setLoading(true);
    showSkeleton(q);

    try {
      const body = { question: q, k, candidate_k: ck };
      if (model) body.model = model;

      const resp = await fetch(API_BASE + '/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${resp.status}`);
      }

      const data = await resp.json();
      renderResult(data);
      pushHistory(data);

    } catch (e) {
      showError(e.message);
      document.getElementById('resultsArea').innerHTML = `
        <div class="empty-state">
          <span class="empty-icon" style="opacity:1">⚠</span>
          <div class="empty-text" style="color:#E24B4A">${esc(e.message)}</div>
        </div>`;
    } finally {
      setLoading(false);
    }
  }

  // ── Keyboard shortcut ─────────────────────────────────────
  document.getElementById('qInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleRun();
  });

  // ── Init ─────────────────────────────────────────────────
  checkHealth();
  fetchSuggestions();
  // re-check health every 30s
  setInterval(checkHealth, 30000);
</script>
</body>
</html>
